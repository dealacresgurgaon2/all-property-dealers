name: Auto Sync to Property Dealers

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Debug Delhi Repo
        run: |
          git remote remove delhi || true

          git remote add delhi https://x-access-token:${{ secrets.DELHI_TOKEN }}@github.com/dealacresDelhi/all-property-dealers.git

          echo "=== REMOTES ==="
          git remote -v

          echo "=== TEST ACCESS ==="
          git ls-remote delhi

      - name: Sync to Delhi Repo
        run: |
          git push delhi HEAD:main --force